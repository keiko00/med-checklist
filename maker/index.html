<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>属于你的小药箱 · 生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ac-primary: #19c8b9; --ac-primary-hover: #3dd4c6; --ac-primary-active: #50B9AB;
  --ac-success: #6fba2c; --ac-warning: #f5c31c; --ac-error: #e05a5a;
  --ac-text: #794f27; --ac-text-secondary: #9f927d; --ac-text-disabled: #c4b89e;
  --ac-border: #c4b89e; --ac-border-light: #e8e2d6;
  --ac-bg: #f8f8f0; --ac-bg-secondary: #f0e8d8;
  --ac-bg-card: rgb(247,243,223);
  --ac-bg-disabled: #f0ece2;
  --ac-shadow-sm: 0 2px 4px 0 rgba(61,52,40,0.06);
  --ac-shadow: 0 3px 10px 0 rgba(61,52,40,0.1);
  --ac-shadow-lg: 0 8px 24px 0 rgba(61,52,40,0.14);
  --ac-radius-sm: 16px; --ac-radius: 20px; --ac-radius-lg: 24px;
  --ac-font: "Nunito","Noto Sans SC","Zen Maru Gothic","HarmonyOS Sans SC","MiSans","PingFang SC","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--ac-font);
  background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
  background-attachment:fixed; min-height:100vh;
  padding:20px 12px 100px; position:relative; overflow-x:hidden;
}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 10%, rgba(111,186,44,0.08) 0%, transparent 50%),
             radial-gradient(ellipse at 85% 85%, rgba(25,200,185,0.06) 0%, transparent 50%),
             radial-gradient(ellipse at 50% 50%, rgba(247,205,103,0.05) 0%, transparent 60%);}
.container{max-width:520px;margin:0 auto;position:relative;z-index:1}

/* ===== Header ===== */
.header{text-align:center;padding:28px 0 16px}
.header .island-icon{font-size:44px;display:block;margin-bottom:8px;animation:leaf-sway 3s ease-in-out infinite}
@keyframes leaf-sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.header h1{font-size:26px;font-weight:900;color:var(--ac-text);text-shadow:0 2px 0 rgba(255,255,255,0.4)}
.header .sub{font-size:13px;color:var(--ac-text-secondary);margin-top:4px;font-weight:500}

/* ===== Card ===== */
.card{
  background:var(--ac-bg-card);border-radius:var(--ac-radius);
  padding:20px;margin-bottom:16px;
  box-shadow:0 4px 10px rgba(107,92,67,.25);
  border:2.5px solid rgba(255,255,255,0.6);
}
.card-title{font-size:15px;font-weight:800;color:var(--ac-text);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ===== Form ===== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--ac-text-secondary);margin-bottom:5px}
.form-group input,.form-group textarea{
  width:100%;padding:10px 14px;border:2.5px solid var(--ac-border);border-radius:50px;
  font-size:14px;color:var(--ac-text);background:var(--ac-bg);
  font-family:var(--ac-font);outline:none;transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--ac-primary)}
.form-group textarea{border-radius:var(--ac-radius-sm);resize:vertical;min-height:60px}

/* ===== Medicine Row ===== */
.med-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.med-row input{flex:1;min-width:80px;padding:8px 12px;border:2.5px solid var(--ac-border);border-radius:50px;
  font-family:var(--ac-font);font-size:13px;color:var(--ac-text);background:var(--ac-bg);outline:none;
  transition:border-color .15s}
.med-row input:focus{border-color:var(--ac-primary)}
.med-row .med-emoji{width:48px;flex:none;text-align:center}
.med-row .med-dosage{width:80px;flex:none}
.med-del-btn{
  width:34px;height:34px;flex:none;border:none;border-radius:50%;
  background:rgba(224,90,90,0.12);color:var(--ac-error);font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s}
.med-del-btn:hover{background:var(--ac-error);color:#fff;transform:scale(1.1)}

/* ===== Buttons ===== */
.ac-btn{
  display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:50px;
  border:2.5px solid var(--ac-border);background:var(--ac-bg-card);color:var(--ac-text);
  font-family:var(--ac-font);font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 0 0 #bdaea0;transition:all .15s;outline:none;
  -webkit-tap-highlight-color:transparent;}
.ac-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 0 #bdaea0;border-color:#a89878}
.ac-btn:active{transform:translateY(2px);box-shadow:0 1px 0 0 #bdaea0}
.ac-btn.primary{background:var(--ac-primary);border-color:#11a89b;color:#fff;box-shadow:0 4px 0 0 #0a9e91}
.ac-btn.primary:hover{box-shadow:0 5px 0 0 #0a9e91}
.ac-btn.ghost{background:transparent;border:2px dashed var(--ac-border-light);box-shadow:none;color:var(--ac-text-secondary)}
.ac-btn.ghost:hover{border-color:var(--ac-primary);color:var(--ac-primary);box-shadow:none}
.ac-btn.block{width:100%;justify-content:center;padding:14px}
.ac-btn.sm{padding:6px 14px;font-size:12px}

/* ===== Date Row ===== */
.date-row{display:flex;gap:10px}
.date-row .form-group{flex:1}

/* ===== Checklist View ===== */
.checklist-header{text-align:center;padding:20px 0 8px}
.checklist-header .title{font-size:24px;font-weight:900;color:var(--ac-text)}
.checklist-header .date-range{font-size:12px;color:var(--ac-text-secondary);margin-top:4px;font-weight:500}

.notice-dialogue{
  background:#fffdf5;border-radius:var(--ac-radius);padding:14px 18px;margin-bottom:18px;
  border:2.5px solid #f7cd67;box-shadow:0 4px 0 0 #e0b800, var(--ac-shadow);
  font-size:13px;color:#725d42;line-height:1.8;position:relative}
.notice-dialogue::after{content:'';position:absolute;bottom:-14px;left:30px;width:0;height:0;
  border-left:10px solid transparent;border-right:10px solid transparent;border-top:14px solid #fffdf5}
.notice-title{font-size:14px;font-weight:800;color:var(--ac-text);margin-bottom:6px}

.day-card{
  background:var(--ac-bg-card);border-radius:var(--ac-radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--ac-shadow);border:2px solid rgba(255,255,255,0.5)}
.day-card.today{background:#fff8e0;border-color:#f7cd67;box-shadow:0 4px 0 0 #e0b800, var(--ac-shadow)}
.day-card .day-label{font-size:13px;font-weight:700;color:var(--ac-text-secondary);margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center}
.day-card .day-label .day-date{color:var(--ac-text);font-size:15px}

.med-check{
  display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;
  cursor:pointer;user-select:none;transition:opacity .15s}
.med-check .checkbox{
  width:26px;height:26px;border-radius:50%;border:2.5px solid var(--ac-border);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex:none;font-size:14px;background:var(--ac-bg)}
.med-check.done .checkbox{background:var(--ac-primary);border-color:#11a89b;color:#fff}
.med-check.done .med-name{text-decoration:line-through;color:var(--ac-text-disabled)}
.med-check .med-name{flex:1;font-weight:600}
.med-check .med-dose{font-size:11px;color:var(--ac-text-secondary)}

.progress-bar{height:8px;background:var(--ac-bg-secondary);border-radius:4px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac-primary),var(--ac-success));border-radius:4px;transition:width .3s}

.streak-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;
  background:#fff8e0;border-radius:50px;font-size:12px;font-weight:700;
  color:#f57f17;border:2px solid #f7cd67;margin-left:6px}

.sync-bar{text-align:center;padding:8px;font-size:11px;color:var(--ac-text-secondary);margin-top:8px}

.back-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;
  background:var(--ac-bg-card);border:2.5px solid var(--ac-border);border-radius:50px;
  font-size:13px;color:var(--ac-text);cursor:pointer;font-weight:700;
  font-family:var(--ac-font);box-shadow:0 3px 0 0 #bdaea0;transition:all .15s;margin-bottom:12px}
.back-btn:hover{transform:translateY(-2px);box-shadow:0 5px 0 0 #bdaea0}
.back-btn:active{transform:translateY(2px);box-shadow:0 1px 0 0 #bdaea0}

/* ===== Token Card ===== */
.token-card{background:#fff8e0;border:2.5px solid #f7cd67;border-radius:var(--ac-radius);
  padding:18px 20px;margin-top:12px;box-shadow:0 4px 0 0 #e0b800, var(--ac-shadow);text-align:center}
.token-card .card-title{justify-content:center}
.token-card p{font-size:12px;color:#725d42;line-height:1.8}

.link-box{background:var(--ac-bg);border-radius:var(--ac-radius-sm);padding:10px 14px;
  font-size:12px;word-break:break-all;color:var(--ac-text);margin:10px 0;text-align:left;
  border:2px solid var(--ac-border-light)}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--ac-text);color:var(--ac-bg);padding:10px 20px;border-radius:50px;
  font-size:13px;font-weight:700;animation:toastIn .3s ease;
  box-shadow:var(--ac-shadow-lg);font-family:var(--ac-font)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.hidden{display:none !important}
.footer-space{height:40px}

@media(max-width:400px){
  .container{padding:12px 10px 100px}
  .med-row{flex-wrap:wrap}
  .med-row .med-dosage{width:70px}
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ============ STATE ============
const GIST_API = 'https://api.github.com/gists';
let gistToken = '';
let currentGistId = null;
let currentMode = 'form';
let checklistData = null;

// ============ INIT ============
function init(){
  const hash = location.hash.slice(1);
  const params = new URLSearchParams(hash);
  if(params.has('token')){
    gistToken = params.get('token');
    localStorage.setItem('med_maker_token', gistToken);
    params.delete('token');
    const newHash = params.toString();
    location.replace(location.pathname + (newHash ? '#' + newHash : ''));
    return;
  }
  gistToken = localStorage.getItem('med_maker_token') || '';
  if(params.has('gist')){
    currentGistId = params.get('gist');
    currentMode = 'checklist';
    loadChecklist();
  } else {
    currentMode = 'form';
    renderForm();
  }
}

// ============ RENDER FORM ============
let medCount = 3;
function renderForm(){
  const myLists = getMyLists();
  document.getElementById('app').innerHTML = `
    <div class="header">
      <span class="island-icon">🏝️</span>
      <h1>属于你的小药箱</h1>
      <div class="sub">定制专属药品提醒，分享给关心的人</div>
    </div>

    <div class="card">
      <div class="card-title">💊 药品列表</div>
      <div id="medList">
        ${[1,2,3].map(i => medRowHTML(i)).join('')}
      </div>
      <button class="ac-btn ghost sm" onclick="addMed()" style="margin-top:8px">＋ 添加药品</button>
    </div>

    <div class="card">
      <div class="card-title">📅 服药周期</div>
      <div class="date-row">
        <div class="form-group">
          <label>开始日期</label>
          <input type="date" id="startDate" value="${todayStr()}">
        </div>
        <div class="form-group">
          <label>结束日期</label>
          <input type="date" id="endDate" value="${daysFromNow(30)}">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📝 备注 / 用药提示</div>
      <textarea id="notes" placeholder="例如：饭后服用；每日一次，一次一片；睡前服用..."></textarea>
    </div>

    <button class="ac-btn primary block" onclick="generateChecklist()" style="margin-top:8px">
      ✨ 生成专属药箱
    </button>

    ${myLists.length > 0 ? `
    <div class="card" style="margin-top:16px">
      <div class="card-title">📋 已生成的药箱</div>
      ${myLists.map(l => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1.5px solid var(--ac-border-light)">
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--ac-text)">${escHtml(l.title)}</div>
            <div style="font-size:11px;color:var(--ac-text-secondary)">${l.date} · ${l.meds}种药</div>
          </div>
          <button class="ac-btn sm" onclick="location.href='#gist=${l.gistId}'">打开</button>
        </div>
      `).join('')}
    </div>
    ` : ''}

    ${!gistToken ? `
    <div class="token-card">
      <div class="card-title">🔑 首次使用</div>
      <p>需要 GitHub Token 才能保存数据。<br>
      请用 <code style="background:var(--ac-bg);padding:2px 8px;border-radius:50px;font-size:11px">#token=你的token</code> 链接打开本页面。</p>
      <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--ac-primary);font-weight:700;font-size:13px">→ 去生成 Token（勾选 gist）</a>
    </div>
    ` : ''}
  `;
}

function medRowHTML(i){
  const defaults = ['', '', ''];
  return `
    <div class="med-row" id="medRow${i}">
      <input class="med-emoji" placeholder="💊" maxlength="2" id="emoji${i}" value="">
      <input placeholder="药品名称" id="name${i}" value="">
      <input class="med-dosage" placeholder="用量" id="dose${i}" value="">
      ${i > 1 ? `<button class="med-del-btn" onclick="removeMed(${i})">✕</button>` : ''}
    </div>`;
}

function addMed(){
  medCount++;
  const div = document.createElement('div');
  div.innerHTML = medRowHTML(medCount);
  document.getElementById('medList').appendChild(div.firstElementChild);
}
function removeMed(i){
  const el = document.getElementById('medRow'+i);
  if(el) el.remove();
}

function getMyLists(){
  try{return JSON.parse(localStorage.getItem('med_maker_lists') || '[]')}catch(e){return[]}
}
function saveMyList(title, gistId, meds, date){
  const lists = getMyLists();
  lists.unshift({title, gistId, meds, date, ts:Date.now()});
  if(lists.length > 20) lists.length = 20;
  localStorage.setItem('med_maker_lists', JSON.stringify(lists));
}

// ============ GENERATE ============
async function generateChecklist(){
  if(!gistToken){showToast('请先设置 GitHub Token（用 #token=xxx 链接打开）');return}
  const medicines = [];
  for(let i=1;i<=medCount;i++){
    const nameEl = document.getElementById('name'+i);
    if(!nameEl || !nameEl.value.trim()) continue;
    medicines.push({
      id: 'med'+i,
      emoji: document.getElementById('emoji'+i)?.value || '💊',
      name: nameEl.value.trim(),
      dose: document.getElementById('dose'+i)?.value || '',
      addedDate: document.getElementById('startDate').value
    });
  }
  if(medicines.length===0){showToast('请至少添加一种药品');return}
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const notes = document.getElementById('notes').value.trim();
  if(!startDate||!endDate){showToast('请选择开始和结束日期');return}
  if(startDate>endDate){showToast('开始日期不能晚于结束日期');return}

  const config = {
    version: 2,
    title: '属于你的小药箱',
    medicines, startDate, endDate, notes,
    createdAt: new Date().toISOString()
  };

  const gistData = {
    description: '属于你的小药箱 · '+medicines.map(m=>m.name).join('、'),
    public: false,
    files: {'med-maker-data.json':{content:JSON.stringify({config, checks:{}}, null, 2)}}
  };

  try{
    showToast('正在生成…');
    const resp = await fetch(GIST_API, {
      method:'POST',
      headers:{'Authorization':'token '+gistToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify(gistData)
    });
    if(!resp.ok){const err=await resp.json();showToast('创建失败：'+(err.message||'请检查 Token 权限（需要 gist）'));return}
    const gist = await resp.json();
    saveMyList(config.title, gist.id, medicines.length, startDate+' ~ '+endDate);
    location.hash = 'gist='+gist.id;
  }catch(e){showToast('网络错误：'+e.message)}
}

// ============ LOAD CHECKLIST ============
async function loadChecklist(){
  if(!gistToken){renderNoToken();return}
  try{
    const resp = await fetch(GIST_API+'/'+currentGistId,{
      headers:{'Authorization':'token '+gistToken,'Accept':'application/vnd.github.v3+json'}
    });
    if(!resp.ok){renderError('无法加载药箱数据，请检查链接是否正确');return}
    const gist = await resp.json();
    const file = gist.files['med-maker-data.json'];
    if(!file){renderError('数据文件不存在');return}
    checklistData = JSON.parse(file.content);
    if(!checklistData.config.medicines[0]?.addedDate){
      // Migrate old data
      checklistData.config.medicines.forEach(m=>{m.addedDate=checklistData.config.startDate});
    }
    renderChecklist();
  }catch(e){renderError('加载失败：'+e.message)}
}

function renderNoToken(){
  document.getElementById('app').innerHTML = `
    <div class="header"><span class="island-icon">🏝️</span><h1>属于你的小药箱</h1></div>
    <div class="token-card">
      <div class="card-title">🔑 需要 Token</div>
      <p>查看药箱需要 GitHub Token。<br>请在链接后添加 <code style="background:var(--ac-bg);padding:2px 8px;border-radius:50px;font-size:11px">#token=你的token</code></p>
      <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--ac-primary);font-weight:700">→ 去生成 Token（勾选 gist）</a>
    </div>
    <button class="back-btn" onclick="location.hash=''" style="margin-top:12px">← 返回首页</button>
  `;
}
function renderError(msg){
  document.getElementById('app').innerHTML = `
    <div class="header"><span class="island-icon">😿</span><h1>出错了</h1></div>
    <div class="card" style="text-align:center"><p style="color:var(--ac-error)">${msg}</p></div>
    <button class="back-btn" onclick="location.hash=''">← 返回首页</button>
  `;
}

// ============ RENDER CHECKLIST ============
function renderChecklist(){
  const {config, checks} = checklistData;
  const today = todayStr();
  const days = getDaysInRange(config.startDate, config.endDate);

  let totalChecks=0, doneChecks=0;
  days.forEach(d=>{
    config.medicines.forEach(m=>{
      if(d < m.addedDate) return;
      totalChecks++;
      if(checks[d] && checks[d][m.id]) doneChecks++;
    });
  });

  let streak=0;
  const todayIdx = days.indexOf(today);
  const checkDay = todayIdx>=0 ? todayIdx : days.length-1;
  for(let i=checkDay;i>=0;i--){
    const d = days[i];
    const dayChecks = checks[d]||{};
    const allDone = config.medicines.filter(m=>d>=m.addedDate).every(m=>dayChecks[m.id]);
    if(allDone) streak++; else break;
  }

  document.getElementById('app').innerHTML = `
    <button class="back-btn" onclick="location.hash=''">← 返回首页</button>
    <div class="checklist-header">
      <div class="title">${escHtml(config.title||'属于你的小药箱')}</div>
      <div class="date-range">${config.startDate} → ${config.endDate} · ${config.medicines.length}种药品</div>
      ${streak>0?`<div style="margin-top:8px"><span class="streak-badge">🔥 连续全勤 ${streak} 天</span></div>`:''}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${totalChecks>0?Math.round(doneChecks/totalChecks*100):0}%"></div></div>
    <div style="text-align:center;font-size:12px;color:var(--ac-text-secondary);margin-bottom:14px;font-weight:600">
      总进度 ${doneChecks}/${totalChecks}（${totalChecks>0?Math.round(doneChecks/totalChecks*100):0}%）
    </div>
    ${config.notes?`
    <div class="notice-dialogue">
      <div class="notice-title">⚠️ 用药提示</div>
      <div style="white-space:pre-wrap">${escHtml(config.notes)}</div>
    </div>
    `:''}
    <div id="daysContainer">${days.map(d=>renderDayCard(d,config,checks,d===today)).join('')}</div>
    <div class="footer-space"></div>
    <div class="sync-bar"><span id="syncStatus">☁️ 自动保存中…</span></div>
    <div style="text-align:center;margin-top:16px">
      <button class="ac-btn ghost sm" onclick="shareLink()">🔗 复制分享链接</button>
    </div>
  `;
}

function renderDayCard(dateStr, config, checks, isToday){
  const dayChecks = checks[dateStr]||{};
  const d = new Date(dateStr+'T00:00:00');
  const weekday = ['日','一','二','三','四','五','六'][d.getDay()];
  const month=d.getMonth()+1, day=d.getDate();
  const visibleMeds = config.medicines.filter(m=>dateStr>=m.addedDate);
  const allDone = visibleMeds.every(m=>dayChecks[m.id]);

  return `
    <div class="day-card${isToday?' today':''}">
      <div class="day-label">
        <span class="day-date">${month}月${day}日 周${weekday} ${isToday?'👈 今天':''}</span>
        ${allDone && visibleMeds.length>0 ? '<span style="color:var(--ac-success);font-size:11px;font-weight:700">✅ 全勤</span>' : ''}
      </div>
      ${visibleMeds.map(m=>{
        const done = dayChecks[m.id];
        return `
          <div class="med-check${done?' done':''}" onclick="toggleCheck('${dateStr}','${m.id}')">
            <div class="checkbox">${done?'✓':''}</div>
            <span class="med-name">${m.emoji} ${escHtml(m.name)}</span>
            ${m.dose?`<span class="med-dose">${escHtml(m.dose)}</span>`:''}
          </div>
        `;
      }).join('')}
      ${visibleMeds.length===0?`<div style="font-size:12px;color:var(--ac-text-disabled);text-align:center;padding:8px">暂无药品</div>`:''}
    </div>
  `;
}

// ============ CHECK TOGGLE ============
async function toggleCheck(dateStr, medId){
  if(!checklistData||!gistToken) return;
  if(!checklistData.checks[dateStr]) checklistData.checks[dateStr]={};
  checklistData.checks[dateStr][medId]=!checklistData.checks[dateStr][medId];
  renderChecklist();
  await saveToGist();
}
async function saveToGist(){
  if(!currentGistId||!gistToken) return;
  const statusEl=document.getElementById('syncStatus');
  if(statusEl) statusEl.textContent='☁️ 保存中…';
  try{
    const resp=await fetch(GIST_API+'/'+currentGistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+gistToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify({files:{'med-maker-data.json':{content:JSON.stringify(checklistData,null,2)}}})
    });
    if(resp.ok && statusEl) statusEl.textContent='☁️ 已保存 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    else if(statusEl) statusEl.textContent='⚠️ 保存失败，请检查网络';
  }catch(e){if(statusEl) statusEl.textContent='⚠️ 保存失败'}
}

// ============ SHARE ============
function shareLink(){
  const url = location.origin+location.pathname+'#gist='+currentGistId;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>showToast('链接已复制！发送给朋友即可分享'))}
  else{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('链接已复制！')}
}

// ============ UTILS ============
function todayStr(){return new Date().toISOString().slice(0,10)}
function daysFromNow(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function getDaysInRange(start,end){
  const days=[],s=new Date(start+'T00:00:00'),e=new Date(end+'T00:00:00');
  while(s<=e){days.push(s.toISOString().slice(0,10));s.setDate(s.getDate()+1)}
  return days;
}
function escHtml(s){const div=document.createElement('div');div.textContent=s;return div.innerHTML}
function showToast(msg){
  const existing=document.querySelector('.toast');if(existing)existing.remove();
  const toast=document.createElement('div');toast.className='toast';toast.textContent=msg;
  document.body.appendChild(toast);setTimeout(()=>toast.remove(),2500);
}

init();
</script>
